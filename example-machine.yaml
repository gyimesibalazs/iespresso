# Complete example device config: ESP32 + ADS1115-read 10k NTC + heater SSR + pump SSR.
# Copy, adjust the hardware to your machine, and put wifi_ssid / wifi_password /
# api_key / ota_password / ap_password in secrets.yaml.
#
# For a machine WITHOUT a pump (e.g. a test rig), drop the `pump:` include, the
# `pump_ssr` output and the binary_sensor block — keep only the controller bits.

substitutions:
  # --- this machine's tuned values (the auto-tune overwrites these at runtime) ---
  base_power_w: "1.7"            # idle draw [W]
  device_power_w: "1450"        # heater power [W]
  default_heating_power: "0.700"
  default_coil_tau: "9.0"
  default_lookahead_s: "9.0"
  default_off_tau_lag: "11.9"
  default_tau_cool: "3100.0"
  # max_safe_temp, off_cap and the timeouts use the package defaults

packages:
  controller: github://gyimesibalazs/iespresso/packages/espresso_controller.yaml@v1.4
  pump:       github://gyimesibalazs/iespresso/packages/pump_controller.yaml@v1.4

esphome:
  name: example-machine
  friendly_name: Example Machine

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- temperature sensing: 10k NTC via an ADS1115 (I2C) ---
i2c:
  sda: 21
  scl: 22
  scan: true

ads1115:
  - address: 0x48
    continuous_mode: true

# --- SSR outputs: heater (id `heater`) + pump (id `pump_ssr`), required by the packages ---
output:
  - platform: slow_pwm          # heater SSR (use ledc for a non-zero-cross SSR)
    period: 1s
    id: heater
    pin: 14
  - platform: ledc              # pump SSR — set_pump_pct sets frequency + duty
    pin: 19
    channel: 1
    frequency: 50Hz
    id: pump_ssr

# --- physical controls wired to GPIOs, calling the pump package's scripts ---
binary_sensor:
  - platform: gpio              # momentary jog button: full power while pressed
    id: pump_button
    pin: { number: 32, inverted: true, mode: { input: true, pullup: true } }
    on_state:
      then:
        - script.stop: preinfusion_brew
        - script.execute: { id: set_pump_pct, pct: !lambda 'return x ? 100 : 0;' }
  - platform: gpio              # brew switch: pre-infusion + brew on press, stop on release
    id: main_switch
    pin: { number: 25, inverted: true, mode: { input: true, pullup: true } }
    on_press:
      then: { script.execute: preinfusion_brew }
    on_release:
      then:
        - script.stop: preinfusion_brew
        - script.execute: { id: set_pump_pct, pct: 0 }

# --- the temperature chain (the controller package needs the id `boiler_temperature`) ---
sensor:
  - platform: ntc
    sensor: resistance_sensor
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    name: Boiler Temperature
    id: boiler_temperature
    accuracy_decimals: 1
  - platform: resistance
    id: resistance_sensor
    sensor: voltage_sensor
    configuration: DOWNSTREAM
    resistor: 10kOhm
    name: Resistance Sensor
  - platform: ads1115
    multiplexer: 'A0_A1'
    update_interval: 500ms
    gain: 2.048
    name: "Voltage measured"
    id: "voltage_sensor"
    filters:
      - skip_initial: 3
      - median:
          send_every: 2
          send_first_at: 1
          window_size: 5
      - lambda: return (3.29/2.0) - x;

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Example Machine Fallback"
    password: !secret ap_password

captive_portal:
