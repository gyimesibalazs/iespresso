# =====================================================================
#  3-WAY SOLENOID VALVE  (OPTIONAL add-on for the pump controller)
# =====================================================================
#  For machines whose brew group has a 3-way solenoid valve: open it while the
#  pump runs (pump power > 0) and close it when the pump stops (== 0), so the
#  group bleeds pressure after the shot.
#
#  Include ALONGSIDE pump_controller.yaml and set the GPIO pin:
#    substitutions:
#      valve_pin: "26"
#    packages:
#      pump:  github://gyimesibalazs/iespresso/packages/pump_controller.yaml@v1.4
#      valve: github://gyimesibalazs/iespresso/packages/pump_valve.yaml@v1.4
#
#  Requires the pump package (it follows its `pump_power`). Machines without a
#  valve simply DON'T include this file — nothing else changes.
# =====================================================================

# Edge-triggered, not polled: a template binary sensor tracks "pump running"
# (pump_power is the snapped level set_pump_pct publishes), and its on_press /
# on_release fire the valve ONLY on the 0<->>0 transition — so every pump path
# (jog, brew sequence, slider, HA) moves the valve, with no relay chatter.
binary_sensor:
  - platform: template
    id: pump_running
    internal: true
    lambda: "return id(pump_power).state > 0.0f;"
    on_press:
      - switch.turn_on: three_way_valve
    on_release:
      - switch.turn_off: three_way_valve

switch:
  - platform: gpio
    pin: ${valve_pin}
    id: three_way_valve
    name: "3-way valve"
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF        # closed at boot
